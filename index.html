        function navigate(pageId, clickedElement) {
            document.querySelectorAll('.nav-link').forEach(link => {
                link.className = 'nav-link flex flex-col items-center justify-center cursor-pointer text-slate-400 hover:text-slate-600 w-full py-2 transition-colors relative';
            });
            
            if (clickedElement) {
                clickedElement.className = 'nav-link flex flex-col items-center justify-center cursor-pointer text-primary relative border-l-4 border-primary w-full py-2 bg-green-50/50 transition-colors';
            } else if (pageId === 'profile' || pageId === 'settings') {
                const el = document.getElementById('nav-' + pageId);
                if(el) el.className = 'nav-link flex flex-col items-center justify-center cursor-pointer text-primary relative border-l-4 border-primary w-full py-2 bg-green-50/50 transition-colors';
            }

            const container = document.getElementById('app-content');
            container.classList.remove('fade-in');
            void container.offsetWidth; 
            container.innerHTML = pages[pageId];
            container.classList.add('fade-in');
            container.scrollTop = 0;
        }

        window.filterCards = function(category, clickedBtn) {
            document.querySelectorAll('.filter-btn').forEach(btn => {
                btn.className = 'filter-btn px-5 py-2 bg-white border border-slate-200 text-slate-600 hover:bg-slate-50 text-sm font-medium rounded-full whitespace-nowrap transition-all';
            });
            clickedBtn.className = 'filter-btn px-5 py-2 bg-primary text-white text-sm font-medium rounded-full whitespace-nowrap shadow-sm transition-all';

            document.querySelectorAll('.scheme-card').forEach(card => {
                if(category === 'all' || card.classList.contains(category)) {
                    card.style.display = 'flex';
                } else {
                    card.style.display = 'none';
                }
            });
        };

        document.addEventListener('DOMContentLoaded', () => {
            navigate('home', document.getElementById('nav-home'));
        });
    </script>
